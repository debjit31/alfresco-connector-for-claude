version: "3.8"

services:
  # ── Alfresco MCP Server (7-stage RAG pipeline) ──────────────────
  alfresco-mcp:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Alfresco connection
      ALFRESCO_BASE_URL: http://alfresco:8080/alfresco
      ALFRESCO_AUTH_USERNAME: admin
      ALFRESCO_AUTH_PASSWORD: admin
      SERVER_PORT: "3000"
      # RAG pipeline — point at compose services
      RAG_EMBEDDING_OLLAMA_BASE_URL: http://ollama:11434
      RAG_RERANKING_OLLAMA_BASE_URL: http://ollama:11434
      RAG_VECTOR_STORE_TYPE: qdrant
      RAG_VECTOR_STORE_QDRANT_URL: http://qdrant:6333
      RAG_VECTOR_STORE_QDRANT_COLLECTION: alfresco_chunks
    depends_on:
      ollama:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - alfresco-net

  # ── Qdrant (persistent vector DB) ───────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"     # REST API
      - "6334:6334"     # gRPC (unused but exposed for tools)
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    networks:
      - alfresco-net

  # ── Ollama (embeddings + reranking) ─────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - alfresco-net
    # Pull required models on first start. Subsequent starts use cache.
    # To pre-pull manually: docker exec ollama ollama pull mxbai-embed-large
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull mxbai-embed-large &&
             ollama pull bge-reranker-v2-m3 &&
             wait"

  # ── Alfresco Community (uncomment if you don't have one) ────────
  # alfresco:
  #   image: alfresco/alfresco-content-repository-community:23.2
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     JAVA_OPTS: >-
  #       -Ddb.driver=org.postgresql.Driver
  #       -Ddb.url=jdbc:postgresql://postgres:5432/alfresco
  #       -Ddb.username=alfresco
  #       -Ddb.password=alfresco
  #   depends_on:
  #     - postgres
  #   networks:
  #     - alfresco-net
  #
  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_DB: alfresco
  #     POSTGRES_USER: alfresco
  #     POSTGRES_PASSWORD: alfresco
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   networks:
  #     - alfresco-net

networks:
  alfresco-net:
    driver: bridge

volumes:
  ollama-models:
  qdrant-data:
  # pgdata:
