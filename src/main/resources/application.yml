server:
  port: 3000

spring:
  application:
    name: alfresco-mcp-server
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ── Alfresco connection ──────────────────────────────────────────────
alfresco:
  base-url: http://localhost:8080/alfresco
  rest-api-path: /api/-default-/public/alfresco/versions/1
  search-api-path: /api/-default-/public/search/versions/1
  auth:
    type: basic                 # basic | ticket | oauth2
    username: admin
    password: admin
  client:
    connect-timeout-ms: 5000
    read-timeout-ms: 30000
    max-in-memory-size-mb: 16   # for large document downloads
  upload:
    max-file-size-mb: 100

# ── MCP server metadata ─────────────────────────────────────────────
mcp:
  server:
    name: alfresco-mcp-server
    version: 1.0.0
    description: "MCP server exposing Alfresco ECM capabilities as AI-callable tools"

# ── RAG / semantic search ───────────────────────────────────────────
rag:
  enabled: true
  chunking:
    chunk-size: 1000
    chunk-overlap: 200
    min-chunk-size: 50
    strategy: sliding_window      # sliding_window | paragraph
  embedding:
    provider: ollama              # local | openai | ollama
    ollama-base-url: http://localhost:11434
    api-base-url: https://api.openai.com/v1
    api-key: ""
    model: mxbai-embed-large      # upgraded from nomic-embed-text for ~10% better retrieval
    dimensions: 1024               # mxbai-embed-large outputs 1024d vectors
  vector-store:
    type: memory                  # memory | qdrant
    max-vectors: 100000           # memory store only
    qdrant-url: http://localhost:6333
    qdrant-api-key: ""            # for Qdrant Cloud (leave blank for local)
    qdrant-collection: alfresco_chunks
    qdrant-timeout-ms: 10000

  # ── Hybrid search (Stage 6: Dense + BM25 + RRF) ──────────────────
  search:
    hybrid-enabled: true          # false = pure vector search only
    semantic-top-k: 20            # candidates from dense vector index
    lexical-top-k: 20             # candidates from BM25 keyword index
    rrf-k: 60                     # RRF constant (standard: 60)

  # ── Cross-encoder reranking (Stage 7) ─────────────────────────────
  reranking:
    enabled: true
    provider: ollama              # none | ollama — now using cross-encoder reranking
    model: bge-reranker-v2-m3     # Ollama reranking model
    ollama-base-url: http://localhost:11434
    top-k-before-rerank: 20       # how many candidates to rerank
    timeout-ms: 30000

  # ── Query expansion (Stage 5: synonym + HyDE-lite) ───────────────
  query-expansion:
    enabled: true                 # synonym expansion + HyDE-lite
    variants: 3                   # max query variants (including original)

# ── Logging ──────────────────────────────────────────────────────────
logging:
  level:
    com.example.alfresco.mcp: DEBUG
    org.springframework.web.reactive.function.client: DEBUG
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"

# ── Actuator ─────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info

# ── SpringDoc / Swagger UI ───────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    try-it-out-enabled: true
    filter: true
    doc-expansion: list
  show-actuator: false
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
